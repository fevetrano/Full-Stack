<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>Cadastro - Lab 10</title>
</head>
<body>
    <div class="container">
        <h1>Criar Nova Conta (Lab 10)</h1>
        <form action="/cadastrar_usuario" method="post">
            <p>Nome Completo: <input type="text" name="nome" required></p>
            <p>Login: <input type="text" name="login" required></p>
            <p>Senha: <input type="password" name="senha" required></p>
            
            <div style="text-align: left; background: #eef; padding: 15px; border-radius: 8px; margin: 10px 0;">
                <input type="checkbox" name="isAdmin" id="isAdmin"> 
                <label for="isAdmin" style="cursor: pointer; font-weight: bold;">Registrar como Administrador (ADM)</label>
            </div>

            <input type="submit" value="Criar Minha Conta">
        </form>
        <p><a href="/lab10/login.html">Já é cadastrado? Faça Login</a></p>
    </div>
</body>
</html>
