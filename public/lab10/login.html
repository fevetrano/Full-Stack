<!-- public/lab10/login.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <title>Login - Carros</title>
</head>
<body>
    <div class="container">
        <h1>Acessar Sistema</h1>
        <form action="/logar_usuario" method="post">
            <input type="hidden" name="destino" id="destinoHidden">
            <p>Login: <input type="text" name="login" required></p>
            <p>Senha: <input type="password" name="senha" required></p>
            <input type="submit" value="Entrar">
        </form>
        <p><a href="cadastro.html">Não tem conta? Cadastre-se</a></p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const destino = urlParams.get('destino');
        if (destino) document.getElementById('destinoHidden').value = destino;
    </script>
</body>
</html>
